<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 250" role="img" aria-labelledby="title desc">
  <title id="title">移动端 DevOps 交付与恢复链路</title>
  <desc id="desc">代码经过验证和发布后进入观察与用户使用；失败时停止、回滚、修复或恢复。</desc>
  <style>
    .bg{fill:#f8fafc}.line{stroke:#0f766e;stroke-width:3;fill:none}.node{fill:#fff;stroke:#0f766e;stroke-width:1.8}.risk{fill:#fffbeb;stroke:#b45309;stroke-width:1.8}.t{font:600 16px system-ui,sans-serif;fill:#0f172a}.s{font:400 11px system-ui,sans-serif;fill:#475569}.a{font:600 12px system-ui,sans-serif;fill:#92400e}
    @media (prefers-color-scheme:dark){.bg{fill:#111827}.node{fill:#1f2937}.risk{fill:#292524}.t{fill:#f8fafc}.s{fill:#cbd5e1}.a{fill:#fbbf24}.line{stroke:#2dd4bf}}
  </style>
  <rect class="bg" width="360" height="250" rx="18"/>
  <path class="line" d="M95 60H133M227 60H265M312 92V130H227M133 160H95"/>
  <path class="line" d="M265 160H227M180 190V205" stroke-dasharray="7 6"/>
  <rect class="node" x="15" y="25" width="80" height="70" rx="12"/>
  <text class="t" x="55" y="56" text-anchor="middle">代码</text><text class="s" x="55" y="76" text-anchor="middle">版本与变更</text>
  <rect class="node" x="133" y="25" width="94" height="70" rx="12"/>
  <text class="t" x="180" y="56" text-anchor="middle">验证</text><text class="s" x="180" y="76" text-anchor="middle">测试与检查</text>
  <rect class="node" x="265" y="25" width="80" height="70" rx="12"/>
  <text class="t" x="305" y="56" text-anchor="middle">发布</text><text class="s" x="305" y="76" text-anchor="middle">分批与门禁</text>
  <rect class="node" x="133" y="125" width="94" height="70" rx="12"/>
  <text class="t" x="180" y="156" text-anchor="middle">观察</text><text class="s" x="180" y="176" text-anchor="middle">用户与系统</text>
  <rect class="node" x="15" y="125" width="80" height="70" rx="12"/>
  <text class="t" x="55" y="156" text-anchor="middle">用户</text><text class="s" x="55" y="176" text-anchor="middle">稳定使用</text>
  <rect class="risk" x="105" y="205" width="210" height="34" rx="10"/>
  <text class="a" x="210" y="227" text-anchor="middle">失败：停止、回滚、修复或恢复</text>
</svg>

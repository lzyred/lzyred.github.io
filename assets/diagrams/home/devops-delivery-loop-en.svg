<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">DevOps path from code to users and recovery after failure</title>
  <desc id="desc">Code moves through validation, release, and observation. Failed validation leads to stop, rollback, repair, or recovery.</desc>
  <style>
    .bg{fill:#f8fafc}.line{stroke:#0f766e;stroke-width:4;fill:none}.node{fill:#fff;stroke:#0f766e;stroke-width:2}.risk{fill:#fffbeb;stroke:#b45309;stroke-width:2}.t{font:600 25px system-ui,sans-serif;fill:#0f172a}.s{font:400 15px system-ui,sans-serif;fill:#475569}.a{font:600 17px system-ui,sans-serif;fill:#92400e}
    @media (prefers-color-scheme:dark){.bg{fill:#111827}.node{fill:#1f2937}.risk{fill:#292524}.t{fill:#f8fafc}.s{fill:#cbd5e1}.a{fill:#fbbf24}.line{stroke:#2dd4bf}}
  </style>
  <rect class="bg" width="1200" height="300" rx="24"/>
  <path class="line" d="M190 105H270M440 105H530M690 105H780M950 105H1020"/>
  <path class="line" d="M865 165V220H620"/>
  <path class="line" d="M620 220H245V165" stroke-dasharray="10 10"/>
  <rect class="node" x="30" y="55" width="160" height="110" rx="16"/>
  <text class="t" x="110" y="101" text-anchor="middle">Code</text><text class="s" x="110" y="132" text-anchor="middle">Versioned change</text>
  <rect class="node" x="270" y="55" width="170" height="110" rx="16"/>
  <text class="t" x="355" y="101" text-anchor="middle">Validate</text><text class="s" x="355" y="132" text-anchor="middle">Tests and checks</text>
  <rect class="node" x="530" y="55" width="160" height="110" rx="16"/>
  <text class="t" x="610" y="101" text-anchor="middle">Release</text><text class="s" x="610" y="132" text-anchor="middle">Staged rollout</text>
  <rect class="node" x="780" y="55" width="170" height="110" rx="16"/>
  <text class="t" x="865" y="101" text-anchor="middle">Observe</text><text class="s" x="865" y="132" text-anchor="middle">Users and systems</text>
  <rect class="node" x="1020" y="55" width="150" height="110" rx="16"/>
  <text class="t" x="1095" y="101" text-anchor="middle">Users</text><text class="s" x="1095" y="132" text-anchor="middle">Reliable service</text>
  <rect class="risk" x="390" y="205" width="460" height="60" rx="14"/>
  <text class="a" x="620" y="242" text-anchor="middle">Failure: stop, roll back, repair, or recover</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">Redis AOF validation flow</title>
  <desc id="desc">Validate a Redis AOF file set through evidence capture, candidate selection, isolated checking, approved use, or stop and reassessment.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#46636f"/></marker><style>.box{fill:#f4f8f8;stroke:#46636f;stroke-width:2}.gate{fill:#fff7dd;stroke:#8a6d1d;stroke-width:2}.risk{fill:#fff0ee;stroke:#9a443b;stroke-width:2}.t{font:18px sans-serif;fill:#18323b;text-anchor:middle}.s{font:14px sans-serif;fill:#49626b;text-anchor:middle}.a{stroke:#46636f;stroke-width:2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="box" x="410" y="30" width="280" height="75" rx="12"/><text class="t" x="550" y="60">记录版本、日志与文件集</text><text class="s" x="550" y="85">Capture version, logs and files</text>
  <rect class="gate" x="405" y="145" width="290" height="75" rx="12"/><text class="t" x="550" y="175">是否有更完整的数据候选？</text><text class="s" x="550" y="200">A more complete candidate?</text>
  <rect class="box" x="75" y="285" width="270" height="80" rx="12"/><text class="t" x="210" y="317">使用更完整候选</text><text class="s" x="210" y="342">Use the stronger candidate</text>
  <rect class="box" x="755" y="285" width="270" height="80" rx="12"/><text class="t" x="890" y="317">检查现有文件集</text><text class="s" x="890" y="342">Inspect current file set</text>
  <rect class="gate" x="405" y="430" width="290" height="75" rx="12"/><text class="t" x="550" y="460">隔离验证是否通过？</text><text class="s" x="550" y="485">Isolated validation passed?</text>
  <rect class="box" x="190" y="590" width="300" height="65" rx="12"/><text class="t" x="340" y="617">经批准后使用</text><text class="s" x="340" y="642">Approved use</text>
  <rect class="risk" x="610" y="580" width="360" height="80" rx="12"/><text class="t" x="790" y="612">停止并重新评估候选</text><text class="s" x="790" y="637">Stop and reassess candidates</text>
  <path class="a" d="M550 105V145"/><path class="a" d="M405 182H210V285"/><path class="a" d="M695 182H890V285"/><path class="a" d="M210 365V400H550V430"/><path class="a" d="M890 365V400H550V430"/><path class="a" d="M500 505V545H340V590"/><path class="a" d="M600 505V545H790V580"/>
  <text class="s" x="300" y="170">是 / Yes</text><text class="s" x="800" y="170">否 / No</text><text class="s" x="420" y="535">是 / Yes</text><text class="s" x="680" y="535">否 / No</text>
</svg>
